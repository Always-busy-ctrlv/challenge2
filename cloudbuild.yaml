steps:
  # Build Content Service image only — with --no-cache to force fresh build
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Build Content Service'
    args: ['build', '--no-cache', '-t', 'gcr.io/$PROJECT_ID/content-service:v4', '-f', 'services/content-service/Dockerfile', '.']
  - name: 'gcr.io/cloud-builders/docker'
    id: 'Push Content Service'
    args: ['push', 'gcr.io/$PROJECT_ID/content-service:v4']
  # Deploy to Cloud Run with increased timeout
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'Deploy Content Service'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'content-service'
      - '--image'
      - 'gcr.io/$PROJECT_ID/content-service:v4'
      - '--region'
      - 'us-central1'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,NODE_ENV=production,LOG_LEVEL=info'
      - '--memory'
      - '512Mi'
      - '--port'
      - '8080'
      - '--timeout'
      - '300'

options:
  logging: CLOUD_LOGGING_ONLY
